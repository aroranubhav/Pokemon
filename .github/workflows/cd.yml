name: CD

on:
  push:
    branches: [ main ]     # only runs when code lands on main

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build & Sign Release APKs
  # ─────────────────────────────────────────
  build-release:
    name: Build & Sign Release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make Gradle executable
        run: chmod +x gradlew

      # Decode the base64 keystore secret back into a binary .jks file
      # This file exists only in the runner's temp filesystem and is
      # discarded when the job finishes
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/pokemon_release.jks

      - name: Build and sign freeRelease APK
        run: ./gradlew assembleFreeRelease
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/pokemon_release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build and sign proRelease APK
        run: ./gradlew assembleProRelease
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/pokemon_release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Upload APKs as GitHub artifacts so they can be downloaded
      # directly from the Actions run even without Firebase
      - name: Upload freeRelease APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeRelease-apk
          path: app/build/outputs/apk/free/release/*.apk
          retention-days: 30

      - name: Upload proRelease APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: proRelease-apk
          path: app/build/outputs/apk/pro/release/*.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 2 — Distribute via Firebase
  # ─────────────────────────────────────────
  distribute:
    name: Distribute to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-release   # only runs if build and signing succeeded

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the APKs built in the previous job
      - name: Download freeRelease APK
        uses: actions/download-artifact@v4
        with:
          name: freeRelease-apk
          path: apks/free

      - name: Download proRelease APK
        uses: actions/download-artifact@v4
        with:
          name: proRelease-apk
          path: apks/pro

      - name: Distribute freeRelease to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_FREE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: free-testers
          file: apks/free/*.apk
          releaseNotes: "Build from commit ${{ github.sha }}"

      - name: Distribute proRelease to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_PRO_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: pro-testers
          file: apks/pro/*.apk
          releaseNotes: "Build from commit ${{ github.sha }}"