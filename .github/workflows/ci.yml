name: CI

on:
  push:
    branches: [ '**' ]        # every branch push
  pull_request:
    branches: [ main ]        # every PR targeting main

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build (compile check)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build free and pro debug
        run: ./gradlew assembleFreeDebug assembleProDebug

  # ─────────────────────────────────────────
  # JOB 2 — Lint (static analysis)
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build           # only runs if build passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint

      - name: Upload lint reports
        if: always()           # upload even if lint finds errors
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: '**/build/reports/lint-results-*.html'
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3 — Unit Tests
  # ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build           # only runs if build passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testFreeDebugUnitTest testProDebugUnitTest

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/reports/tests/'
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 4 — Instrumented Tests
  # ─────────────────────────────────────────
  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    needs: unit-tests      # only runs if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make Gradle executable
        run: chmod +x gradlew

      # Enable KVM for hardware acceleration — significantly speeds up emulator boot
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedFreeDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'
          retention-days: 7